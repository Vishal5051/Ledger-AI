name: LedgerAI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Frontend Dependencies
      run: |
        cd Frontend
        npm install --no-audit --no-fund

    - name: Run Unit Tests
      run: |
        cd Frontend
        npx vitest run

    - name: Compile Frontend Production Build
      run: |
        cd Frontend
        npm run build

    - name: Install Backend Dependencies
      run: |
        cd Backend
        npm install --no-audit --no-fund
